<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>MBTI人格测试</title>
  <style>
   .container { max-width: 800px; margin: 0 auto; padding: 20px; font-family: Arial, sans-serif; }
   .section { background: #f9f9f9; padding: 30px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 20px; }
   .btn { padding: 12px 24px; background: #2c3e50; color: white; border: none; border-radius: 6px; cursor: pointer; transition: background 0.3s; }
   .btn:hover { background: #34495e; }
   .option { display: block; width: 100%; padding: 14px; margin: 10px 0; text-align: left; background: white; border: 1px solid #e0e0e0; border-radius: 6px; cursor: pointer; }
   .option:hover { background: #f0f7ff; border-color: #b3d1ff; }
   .progress { height: 10px; background: #eee; border-radius: 5px; margin: 20px 0; overflow: hidden; }
   .progress-bar { height: 100%; background: #3498db; width: 0%; transition: width 0.3s; }
   .hidden { display: none; }
   .group-tag { display: inline-block; padding: 5px 12px; margin: 10px 0; border-radius: 20px; color: white; font-size: 14px; }
   .analyst { background: #3498db; }
   .diplomat { background: #e74c3c; }
   .guardian { background: #2ecc71; }
   .explorer { background: #f39c12; }
   .career-list { list-style: none; padding: 0; }
   .career-list li { background: #f0f0f0; padding: 8px; margin: 5px 0; border-radius: 4px; }
   .note { background: #fff3cd; padding: 15px; border-radius: 6px; margin-top: 20px; }
  </style>
</head>

  <div class="container">
    <!-- 开始页 -->

      <h1>MBTI人格测试</h1>
      <p>共25题，每题4个选项，完成后生成详细分析</p>
      <button id="startBtn" class="btn">开始测试</button>
    </div>

    <!-- 测试页 -->
    <div id="quiz" class="section hidden">
      <div class="progress"><div class="progress-bar" id="progressBar"></div></div>
      <h3 id="questionText"></h3>
      <div id="options"></div>
    </div>

      <h3>人格特质分析</h3>
      <div id="analysis"></div>
      <h3>适合的职业</h3>
      <ul class="career-list" id="careers"></ul>
      <div class="note">
        <h3>注意事项</h3>
        <div id="notes"></div>
      </div>
      <button id="restartBtn" class="btn">重新测试</button>
    </div>
  </div>
