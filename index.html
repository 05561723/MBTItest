<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>20题MBTI测试</title>
  <style>
   .container { max-width: 800px; margin: 0 auto; padding: 20px; font-family: Arial, sans-serif; }
   .page { background: #f9f9f9; padding: 30px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 20px; }
   .hidden { display: none; }
   .btn { padding: 12px 24px; background: #2c3e50; color: white; border: none; border-radius: 6px; cursor: pointer; transition: background 0.3s; }
   .btn:hover { background: #34495e; }
   .option { display: block; width: 100%; padding: 14px; margin: 10px 0; text-align: left; background: white; border: 1px solid #e0e0e0; border-radius: 6px; cursor: pointer; transition: all 0.2s; }
   .option:hover { background: #f0f7ff; border-color: #b3d1ff; }
   .progress { height: 10px; background: #eee; border-radius: 5px; margin: 20px 0; overflow: hidden; }
   .progress-bar { height: 100%; background: #3498db; width: 0%; transition: width 0.3s; }
   .result-tag { display: inline-block; padding: 5px 12px; margin: 10px 0; border-radius: 20px; color: white; font-size: 14px; }
   .result-analysis { line-height: 1.6; margin: 20px 0; }
   .career-list { list-style: none; padding: 0; }
   .career-list li { background: #f0f0f0; padding: 8px; margin: 5px 0; border-radius: 4px; }
  </style>
</head>
<body>
  <div class="container">
    <!-- 开始页 -->
    <div id="startPage" class="page">
      <h1>20题MBTI人格测试</h1>
      <p>本测试基于能量来源、感知方式、判断标准、生活态度四个维度，共20题，帮助你了解自己的人格类型。</p>
      <button id="startBtn" class="btn">开始测试</button>
    </div>

    <!-- 测试页 -->
    <div id="quizPage" class="page hidden">
      <div class="progress">
        <div class="progress-bar" id="progressBar"></div>
      </div>
      <h3 id="questionText"></h3>
      <div id="optionsContainer"></div>
    </div>

    <!-- 结果页 -->
    <div id="resultPage" class="page hidden">
      <h2>你的MBTI类型：<span id="typeResult"></span></h2>
      <div id="typeTag" class="result-tag"></div>
      
      <h3>人格特质分析</h3>
      <div id="personalityAnalysis" class="result-analysis"></div>
      
      <h3>适合的职业方向</h3>
      <ul class="career-list" id="careerList"></ul>
      
      <button id="restartBtn" class="btn">重新测试</button>
    </div>
  </div>

  <script>
    // 题库（20题，分四个维度）
    const questions = [
      // 一、能量来源（E/I）
      {
        text: "1. 社交后你更倾向于：",
        options: [
          { text: "A. 感到精力充沛，想继续互动", value: { E: 3, I: 0 } },
          { text: "B. 略感疲惫，但能再聊会儿", value: { E: 2, I: 1 } },
          { text: "C. 希望独处片刻恢复精力", value: { E: 1, I: 2 } },
          { text: "D. 极度疲惫，必须立刻独处", value: { E: 0, I: 3 } }
        ]
      },
      {
        text: "2. 你更享受：",
        options: [
          { text: "A. 大型聚会中认识新朋友", value: { E: 3, I: 0 } },
          { text: "B. 小范围好友聚餐", value: { E: 2, I: 1 } },
          { text: "C. 一对一深度聊天", value: { E: 1, I: 2 } },
          { text: "D. 独自做喜欢的事", value: { E: 0, I: 3 } }
        ]
      },
      {
        text: "3. 面对公开演讲，你会：",
        options: [
          { text: "A. 享受展示机会", value: { E: 3, I: 0 } },
          { text: "B. 略紧张但能完成", value: { E: 2, I: 1 } },
          { text: "C. 尽量避免", value: { E: 1, I: 2 } },
          { text: "D. 极度抗拒", value: { E: 0, I: 3 } }
        ]
      },
      {
        text: "4. 长时间独处后，你会：",
        options: [
          { text: "A. 感到无聊，想社交", value: { E: 3, I: 0 } },
          { text: "B. 偶尔想找人聊天", value: { E: 2, I: 1 } },
          { text: "C. 觉得舒适，偶尔需要互动", value: { E: 1, I: 2 } },
          { text: "D. 享受独处，不想被打扰", value: { E: 0, I: 3 } }
        ]
      },
      {
        text: "5. 团队讨论时，你通常：",
        options: [
          { text: "A. 主动发言，主导话题", value: { E: 3, I: 0 } },
          { text: "B. 积极参与，偶尔提出观点", value: { E: 2, I: 1 } },
          { text: "C. 倾听为主，必要时发言", value: { E: 1, I: 2 } },
          { text: "D. 很少发言，默默思考", value: { E: 0, I: 3 } }
        ]
      },

      // 二、感知方式（S/N）
      {
        text: "6. 学习新技能时，你先关注：",
        options: [
          { text: "A. 具体步骤和操作细节", value: { S: 3, N: 0 } },
          { text: "B. 实用技巧和常见问题", value: { S: 2, N: 1 } },
          { text: "C. 整体框架和原理", value: { S: 1, N: 2 } },
          { text: "D. 创新用法和可能性", value: { S: 0, N: 3 } }
        ]
      },
      {
        text: "7. 描述一件事时，你更侧重：",
        options: [
          { text: "A. 时间、地点等具体细节", value: { S: 3, N: 0 } },
          { text: "B. 关键事实和结果", value: { S: 2, N: 1 } },
          { text: "C. 背后的意义和影响", value: { S: 1, N: 2 } },
          { text: "D. 未来的可能性", value: { S: 0, N: 3 } }
        ]
      },
      {
        text: "8. 你对“传统”的态度是：",
        options: [
          { text: "A. 严格遵循，认为有价值", value: { S: 3, N: 0 } },
          { text: "B. 保留有用部分，其他忽略", value: { S: 2, N: 1 } },
          { text: "C. 不排斥，但更愿尝试新方法", value: { S: 1, N: 2 } },
          { text: "D. 觉得束缚，倾向打破", value: { S: 0, N: 3 } }
        ]
      },
      {
        text: "9. 做计划时，你更在意：",
        options: [
          { text: "A. 详细步骤和截止时间", value: { S: 3, N: 0 } },
          { text: "B. 核心目标和大致流程", value: { S: 2, N: 1 } },
          { text: "C. 灵活调整的空间", value: { S: 1, N: 2 } },
          { text: "D. 长远方向，不拘泥细节", value: { S: 0, N: 3 } }
        ]
      },
      {
        text: "10. 你擅长解决：",
        options: [
          { text: "A. 有明确答案的具体问题", value: { S: 3, N: 0 } },
          { text: "B. 结合经验的实际问题", value: { S: 2, N: 1 } },
          { text: "C. 需要逻辑推理的复杂问题", value: { S: 1, N: 2 } },
          { text: "D. 开放性的抽象问题", value: { S: 0, N: 3 } }
        ]
      },

      // 三、判断标准（T/F）
      {
        text: "11. 做决定时，你更依赖：",
        options: [
          { text: "A. 逻辑和客观数据", value: { T: 3, F: 0 } },
          { text: "B. 逻辑为主，兼顾情感", value: { T: 2, F: 1 } },
          { text: "C. 情感和逻辑平衡", value: { T: 1, F: 2 } },
          { text: "D. 他人感受和关系", value: { T: 0, F: 3 } }
        ]
      },
      {
        text: "12. 面对他人错误，你会：",
        options: [
          { text: "A. 直接指出，不绕弯子", value: { T: 3, F: 0 } },
          { text: "B. 客观指出，语气温和", value: { T: 2, F: 1 } },
          { text: "C. 先肯定，再委婉指出", value: { T: 1, F: 2 } },
          { text: "D. 尽量不指出，怕伤和气", value: { T: 0, F: 3 } }
        ]
      },
      {
        text: "13. 你认为“公平”是：",
        options: [
          { text: "A. 所有人按同一规则办事", value: { T: 3, F: 0 } },
          { text: "B. 多数情况按规则，特殊情况微调", value: { T: 2, F: 1 } },
          { text: "C. 考虑个体差异，追求实质公平", value: { T: 1, F: 2 } },
          { text: "D. 让每个人都感到被照顾", value: { T: 0, F: 3 } }
        ]
      },
      {
        text: "14. 评价他人时，你更看重：",
        options: [
          { text: "A. 能力和结果", value: { T: 3, F: 0 } },
          { text: "B. 能力与态度并重", value: { T: 2, F: 1 } },
          { text: "C. 态度和合作性", value: { T: 1, F: 2 } },
          { text: "D. 同理心和亲和力", value: { T: 0, F: 3 } }
        ]
      },
      {
        text: "15. 解决冲突时，你优先：",
        options: [
          { text: "A. 找到最优解，不管情绪", value: { T: 3, F: 0 } },
          { text: "B. 解决问题，减少不快", value: { T: 2, F: 1 } },
          { text: "C. 平衡双方感受和问题", value: { T: 1, F: 2 } },
          { text: "D. 安抚情绪，再谈解决方案", value: { T: 0, F: 3 } }
        ]
      },

      // 四、生活态度（J/P）
      {
        text: "16. 你更喜欢的生活节奏：",
        options: [
          { text: "A. 严格按计划进行", value: { J: 3, P: 0 } },
          { text: "B. 有大致计划，灵活调整", value: { J: 2, P: 1 } },
          { text: "C. 少量计划，随情况变动", value: { J: 1, P: 2 } },
          { text: "D. 顺其自然，不做计划", value: { J: 0, P: 3 } }
        ]
      },
      {
        text: "17. 面对截止日期，你会：",
        options: [
          { text: "A. 提前完成，绝不拖延", value: { J: 3, P: 0 } },
          { text: "B. 按计划推进，准时完成", value: { J: 2, P: 1 } },
          { text: "C. 临近截止时集中完成", value: { J: 1, P: 2 } },
          { text: "D. 常拖延到最后一刻", value: { J: 0, P: 3 } }
        ]
      },
      {
        text: "18. 你的物品摆放：",
        options: [
          { text: "A. 整齐有序，固定位置", value: { J: 3, P: 0 } },
          { text: "B. 大致整齐，常用物品顺手放", value: { J: 2, P: 1 } },
          { text: "C. 有点乱，但自己能找到", value: { J: 1, P: 2 } },
          { text: "D. 随性摆放，不拘小节", value: { J: 0, P: 3 } }
        ]
      },
      {
        text: "19. 对突发变化，你的反应：",
        options: [
          { text: "A. 感到烦躁，尽快恢复计划", value: { J: 3, P: 0 } },
          { text: "B. 略感不适，但能适应", value: { J: 2, P: 1 } },
          { text: "C. 无所谓，灵活调整", value: { J: 1, P: 2 } },
          { text: "D. 觉得新鲜，乐于接受", value: { J: 0, P: 3 } }
        ]
      },
      {
        text: "20. 你更倾向于：",
        options: [
          { text: "A. 一次只做一件事，做完再换", value: { J: 3, P: 0 } },
          { text: "B. 主要做一件事，偶尔兼顾其他", value: { J: 2, P: 1 } },
          { text: "C. 同时处理几件事，灵活切换", value: { J: 1, P: 2 } },
          { text: "D. 想到什么做什么，不刻意安排", value: { J: 0, P: 3 } }
        ]
      }
    ];

    // 结果分析数据（示例，可根据需要扩展）
    const resultData = {
      "ESTJ": {
        tag: "管理者",
        color: "#e74c3c",
        analysis: "你务实、果断，擅长组织和管理，重视规则和效率，是天生的领导者。做事有条理，能在复杂环境中保持清醒，善于制定计划并推动执行。",
        careers: ["项目经理", "行政主管", "军官", "财务总监"]
      },
      "INFP": {
        tag: "理想主义者",
