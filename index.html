<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MBTI测试</title>
  <style>
   .container { max-width: 800px; margin: 0 auto; padding: 20px; font-family: sans-serif; }
   .page { background: #f5f5f5; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
   .hidden { display: none; }
   .btn { padding: 10px 20px; background: #4CAF50; color: white; border: none; border-radius: 4px; cursor: pointer; margin-top: 10px; }
   .btn:hover { background: #45a049; }
   .option { width: 100%; padding: 10px; margin: 8px 0; text-align: left; background: white; border: 1px solid #ddd; border-radius: 4px; cursor: pointer; }
   .option:hover { background: #f0f8ff; }
   .progress { height: 8px; background: #eee; border-radius: 4px; margin: 15px 0; }
   .progress-bar { height: 100%; background: #4CAF50; width: 0%; }
   .result-group { display: inline-block; padding: 3px 10px; background: #ddd; border-radius: 12px; font-size: 12px; margin-left: 10px; }
  </style>
</head>
<body>
  <div class="container">
    <!-- 开始页 -->
    <div id="start" class="page">
      <h2>MBTI人格测试</h2>
      <p>共20题，完成后将展示你的人格类型及分析</p>
      <button onclick="startTest()" class="btn">开始测试</button>
    </div>

    <!-- 测试页 -->
    <div id="test" class="page hidden">
      <div class="progress">
        <div id="progress" class="progress-bar"></div>
      </div>
      <h3 id="question"></h3>
      <div id="options"></div>
    </div>

    <!-- 结果页 -->
    <div id="result" class="page hidden">
      <h2>你的结果：<span id="type"></span>
        <span id="group" class="result-group"></span>
      </h2>
      <h3>人格分析</h3>
      <p id="analysis"></p>
      <h3>适合职业</h3>
      <ul id="careers"></ul>
      <button onclick="restart()" class="btn">重新测试</button>
    </div>
  </div>

  <script src="test.js"></script>
</body>
</html>
