<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MBTI人格测试</title>
  <style>
   .container { max-width: 800px; margin: 0 auto; padding: 20px; font-family: Arial, sans-serif; }
   .page { background: #f9f9f9; padding: 30px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 20px; }
   .hidden { display: none; }
   .btn { padding: 12px 24px; background: #2c3e50; color: white; border: none; border-radius: 6px; cursor: pointer; transition: background 0.3s; }
   .btn:hover { background: #34495e; }
   .option { display: block; width: 100%; padding: 14px; margin: 10px 0; text-align: left; background: white; border: 1px solid #e0e0e0; border-radius: 6px; cursor: pointer; transition: all 0.2s; }
   .option:hover { background: #f0f7ff; border-color: #b3d1ff; }
   .progress { height: 10px; background: #eee; border-radius: 5px; margin: 20px 0; overflow: hidden; }
   .progress-bar { height: 100%; background: #3498db; width: 0%; transition: width 0.3s; }
   .result-tag { display: inline-block; padding: 5px 12px; margin: 10px 0; border-radius: 20px; color: white; font-size: 14px; }
   .group-badge { display: inline-block; padding: 3px 10px; border-radius: 15px; font-size: 13px; margin-left: 10px; }
   .result-analysis { line-height: 1.6; margin: 20px 0; }
   .career-list { list-style: none; padding: 0; }
   .career-list li { background: #f0f0f0; padding: 8px; margin: 5px 0; border-radius: 4px; }
  </style>
</head>
<body>
  <div class="container">
    <!-- 开始页 -->
    <div id="startPage" class="page">
      <h1>MBTI人格测试</h1>
      <p>共20题，帮助你了解自己的人格类型及所属族群（分析家、外交官、守护者、探险家）。</p>
      <button id="startBtn" class="btn">开始测试</button>
    </div>

    <!-- 测试页 -->
    <div id="quizPage" class="page hidden">
      <div class="progress">
        <div class="progress-bar" id="progressBar"></div>
      </div>
      <h3 id="questionText"></h3>
      <div id="optionsContainer"></div>
    </div>

    <!-- 结果页 -->
    <div id="resultPage" class="page hidden">
      <h2>你的MBTI类型：<span id="typeResult"></span>
        <span class="group-badge" id="groupBadge"></span>
      </h2>
      <div id="typeTag" class="result-tag"></div>
      
      <h3>族群特色</h3>
      <p id="groupAnalysis" class="result-analysis"></p>
      
      <h3>人格特质分析</h3>
      <div id="personalityAnalysis" class="result-analysis"></div>
      
      <h3>适合的职业方向</h3>
      <ul class="career-list" id="careerList"></ul>
      
      <button id="restartBtn" class="btn">重新测试</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
